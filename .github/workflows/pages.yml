# Publie le site statique sur GitHub Pages (bundle minimal : index, CSS, JS, img).
#
# Prérequis UNE FOIS sur GitHub :
#   Settings → Pages → Build and deployment → Source : « GitHub Actions »
# (pas « Deploy from a branch »). Sinon l’API Pages renvoie 404 et le déploiement échoue.
#
# Pas d’étape actions/configure-pages ici : elle sert aux SSG (Next/Nuxt…) et exige
# un site Pages déjà créé ; pour du HTML statique elle est inutile.
name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare static bundle
        run: |
          # Bust browser/CDN cache: same filenames otherwise stay cached across deploys.
          CACHE_BUST=$(git rev-parse --short HEAD)
          mkdir -p _site
          sed -e "s|href=\"style.css\"|href=\"style.css?v=${CACHE_BUST}\"|g" \
              -e "s|src=\"app.js\"|src=\"app.js?v=${CACHE_BUST}\"|g" \
              index.html > _site/index.html
          cp style.css app.js _site/
          cp -r img _site/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
